<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Ultimate Quiz App</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
    rel="stylesheet"
  >

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      color:white;
    }

    .quiz-container{
      width:100%;
      max-width:800px;
      background:#111827;
      border-radius:25px;
      overflow:hidden;
      box-shadow:0 10px 40px rgba(0,0,0,0.5);
    }

    .quiz-header{
      padding:30px;
      text-align:center;
      background:linear-gradient(to right,#2563eb,#7c3aed);
    }

    .quiz-header h1{
      font-size:3rem;
      font-weight:700;
    }

    .quiz-header p{
      margin-top:10px;
      color:#dbeafe;
    }

    .quiz-body{
      padding:35px;
    }

    .question-number{
      color:#facc15;
      font-size:18px;
      margin-bottom:10px;
      font-weight:600;
    }

    .question{
      font-size:28px;
      font-weight:700;
      margin-bottom:30px;
      line-height:1.4;
    }

    .option{
      background:#1e293b;
      padding:18px;
      border-radius:15px;
      margin-bottom:15px;
      cursor:pointer;
      transition:0.3s;
      border:2px solid transparent;
      font-size:17px;
    }

    .option:hover{
      background:#334155;
      transform:translateX(5px);
    }

    .option.correct{
      background:#16a34a;
      border-color:#22c55e;
    }

    .option.wrong{
      background:#dc2626;
      border-color:#ef4444;
    }

    .next-btn{
      width:100%;
      padding:15px;
      border:none;
      border-radius:15px;
      margin-top:20px;
      background:linear-gradient(to right,#2563eb,#7c3aed);
      color:white;
      font-size:18px;
      font-weight:600;
      transition:0.3s;
    }

    .next-btn:hover{
      transform:scale(1.02);
    }

    .progress{
      height:12px;
      border-radius:20px;
      overflow:hidden;
      background:#334155;
      margin-bottom:25px;
    }

    .progress-bar{
      background:linear-gradient(to right,#22c55e,#06b6d4);
    }

    .score-box{
      text-align:center;
      padding:50px 20px;
    }

    .score-box h2{
      font-size:3rem;
      color:#facc15;
      margin-bottom:20px;
    }

    .score-box p{
      font-size:24px;
      margin-bottom:30px;
    }

    .restart-btn{
      padding:15px 35px;
      border:none;
      border-radius:15px;
      background:#22c55e;
      color:white;
      font-size:18px;
      font-weight:600;
    }

    .restart-btn:hover{
      background:#16a34a;
    }

    .timer{
      text-align:right;
      color:#f87171;
      font-weight:600;
      margin-bottom:15px;
      font-size:18px;
    }

  </style>
</head>

<body>

  <div class="quiz-container">

    <div class="quiz-header">
      <h1>🧠 Ultimate Quiz</h1>
      <p>Test Your Knowledge with Interactive Questions</p>
    </div>

    <div class="quiz-body" id="quizBody">

      <!-- Progress Bar -->

      <div class="progress">
        <div
          class="progress-bar"
          id="progressBar"
          style="width:0%"
        ></div>
      </div>

      <!-- Timer -->

      <div class="timer">
        ⏳ Time Left: <span id="timer">15</span>s
      </div>

      <!-- Question Number -->

      <div class="question-number" id="questionNumber">
        Question 1 of 5
      </div>

      <!-- Question -->

      <div class="question" id="question">
        Loading...
      </div>

      <!-- Options -->

      <div id="optionsContainer"></div>

      <!-- Button -->

      <button
        class="next-btn"
        id="nextBtn"
        onclick="nextQuestion()"
      >
        Next Question →
      </button>

    </div>

  </div>

  <script>

    const quizData = [

      {
        question:"Which language is used for web apps?",
        options:["Python","Java","JavaScript","C++"],
        answer:"JavaScript"
      },

      {
        question:"Who is the founder of Microsoft?",
        options:["Steve Jobs","Bill Gates","Elon Musk","Mark Zuckerberg"],
        answer:"Bill Gates"
      },

      {
        question:"What does HTML stand for?",
        options:[
          "Hyper Text Markup Language",
          "High Transfer Machine Language",
          "Hyperlink Text Management Language",
          "Home Tool Markup Language"
        ],
        answer:"Hyper Text Markup Language"
      },

      {
        question:"Which planet is called the Red Planet?",
        options:["Earth","Mars","Venus","Jupiter"],
        answer:"Mars"
      },

      {
        question:"Which company developed React?",
        options:["Google","Facebook","Microsoft","Amazon"],
        answer:"Facebook"
      }

    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;
    let timer;
    let timeLeft = 15;

    const questionEl =
      document.getElementById("question");

    const optionsContainer =
      document.getElementById("optionsContainer");

    const questionNumber =
      document.getElementById("questionNumber");

    const progressBar =
      document.getElementById("progressBar");

    const timerEl =
      document.getElementById("timer");

    function loadQuestion(){

      answered = false;

      clearInterval(timer);

      timeLeft = 15;

      startTimer();

      const currentQuiz =
        quizData[currentQuestion];

      questionNumber.innerHTML =
        `Question ${currentQuestion + 1} of ${quizData.length}`;

      questionEl.innerHTML =
        currentQuiz.question;

      progressBar.style.width =
        ((currentQuestion)/quizData.length)*100 + "%";

      optionsContainer.innerHTML = "";

      currentQuiz.options.forEach(option => {

        const button =
          document.createElement("div");

        button.classList.add("option");

        button.innerHTML = option;

        button.onclick = () =>
          selectAnswer(button,option);

        optionsContainer.appendChild(button);

      });

    }

    function selectAnswer(element,selected){

      if(answered) return;

      answered = true;

      clearInterval(timer);

      const correctAnswer =
        quizData[currentQuestion].answer;

      const options =
        document.querySelectorAll(".option");

      options.forEach(option => {

        if(option.innerHTML === correctAnswer){

          option.classList.add("correct");

        }

        else if(option.innerHTML === selected){

          option.classList.add("wrong");

        }

      });

      if(selected === correctAnswer){

        score++;

      }

    }

    function nextQuestion(){

      if(currentQuestion < quizData.length - 1){

        currentQuestion++;

        loadQuestion();

      }

      else{

        showScore();

      }

    }

    function showScore(){

      clearInterval(timer);

      progressBar.style.width = "100%";

      document.getElementById("quizBody").innerHTML =

      `

        <div class="score-box">

          <h2>🎉 Quiz Completed!</h2>

          <p>
            Your Score:
            <strong>${score}/${quizData.length}</strong>
          </p>

          <button
            class="restart-btn"
            onclick="restartQuiz()"
          >
            🔄 Restart Quiz
          </button>

        </div>

      `;

    }

    function restartQuiz(){

      currentQuestion = 0;

      score = 0;

      document.getElementById("quizBody").innerHTML =

      `

      <div class="progress">
        <div
          class="progress-bar"
          id="progressBar"
          style="width:0%"
        ></div>
      </div>

      <div class="timer">
        ⏳ Time Left:
        <span id="timer">15</span>s
      </div>

      <div
        class="question-number"
        id="questionNumber"
      ></div>

      <div
        class="question"
        id="question"
      ></div>

      <div id="optionsContainer"></div>

      <button
        class="next-btn"
        onclick="nextQuestion()"
      >
        Next Question →
      </button>

      `;

      location.reload();

    }

    function startTimer(){

      timerEl.innerHTML = timeLeft;

      timer = setInterval(()=>{

        timeLeft--;

        timerEl.innerHTML = timeLeft;

        if(timeLeft <= 0){

          clearInterval(timer);

          nextQuestion();

        }

      },1000);

    }

    loadQuestion();

  </script>

</body>
</html>
